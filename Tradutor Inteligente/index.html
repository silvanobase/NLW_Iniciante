<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌍 Tradutor Inteligente</h1>

        <label for="fromLang">Selecione o idioma de origem:</label>
        <select id="fromLang">
            <option value="auto">Detetar automaticamente</option>
            <option value="pt">Português</option>
            <option value="es">Espanhol</option>
            <option value="en">Inglês</option>
            <option value="fr">Francês</option>
        </select>

        <label for="toLang">Traduzir para:</label>
        <select id="toLang">
            <option value="pt">Português</option>
            <option value="es">Espanhol</option>
            <option value="en">Inglês</option>
            <option value="fr">Francês</option>
        </select>

        <textarea id="textInput" placeholder="Digite o texto para traduzir"></textarea>

        <button id="translateBtn">Traduzir</button>

        <div class="output">
            <h3>Tradução:</h3>
            <p id="translatedText"></p>
            <p id="copiedText"></p>
        </div>

        <div id="actions">
            <button id="copyBtn">📋 Copiar</button>
            <button id="speakBtn">🔊 Ouvir</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
